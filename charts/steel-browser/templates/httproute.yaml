{{- if and .Values.gateway.enabled .Values.components.scheduler.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "steel-browser.componentFullname" (dict "root" . "component" "scheduler") }}
  labels:
    {{- include "steel-browser.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "steel-browser.componentFullname" (dict "root" . "component" "scheduler") }}
          port: {{ .Values.service.port }}
{{- end }}
