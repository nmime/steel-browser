# KEDA example. The trigger set is applied to each enabled component.
hpa:
  enabled: false
keda:
  enabled: true
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start: "0 8 * * *"
        end: "0 20 * * *"
        desiredReplicas: "2"
